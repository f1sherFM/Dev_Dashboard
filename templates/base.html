{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dev Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="site-header__inner">
                <a class="brand" href="{% url 'dashboard:home' %}">Dev Dashboard</a>
                <nav class="site-nav">
                    {% if user.is_authenticated %}
                    <a href="{% url 'goals:list' %}">Goals</a>
                    <a href="{% url 'habits:list' %}">Habits</a>
                    <a href="{% url 'reviews:today' %}">Reviews</a>
                    <a href="{% url 'projects_overview:list' %}">Projects</a>
                    <a href="{% url 'accounts:profile' %}">Profile</a>
                    <form action="{% url 'accounts:logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="link-button">Logout</button>
                    </form>
                    {% else %}
                    <a href="{% url 'accounts:login' %}">Login</a>
                    <a href="{% url 'accounts:signup' %}">Sign up</a>
                    {% endif %}
                </nav>
            </div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
