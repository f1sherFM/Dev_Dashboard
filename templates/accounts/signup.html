{% extends "base.html" %}

{% block title %}Sign Up | Dev Dashboard{% endblock %}

{% block content %}
<section class="card">
    <h1>Create account</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-row">
            {{ field.label_tag }}
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}
        <button class="button" type="submit">Create account</button>
    </form>
</section>
{% endblock %}
